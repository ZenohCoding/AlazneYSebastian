<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sebastián &amp; Alazne</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/enhance.css">
</head>
<body>

  <svg class="grain" aria-hidden="true">
    <filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
  </svg>

  <div class="glow-orb glow-1" aria-hidden="true"></div>
  <div class="glow-orb glow-2" aria-hidden="true"></div>

  <div id="boot-screen" class="boot-screen">
    <p id="boot-lines" class="boot-lines"></p>
  </div>

  <div id="ambient-hearts" class="ambient-hearts" aria-hidden="true"></div>

  <main id="hero" class="hero">
    <p class="eyebrow">un pequeño programa hecho a mano — para Alazne</p>

    <h1 class="question">
      ¿Cuánto<br>
      llevamos<br>
      <span class="highlight">juntos?</span>
    </h1>

    <p class="hero-sub">Hay una respuesta exacta. Al segundo.<br>Solo hay que ir a buscarla.</p>

    <button id="ver-btn" class="ver-btn" data-magnetic>
      <span class="ver-btn-code">&gt;</span>
      <span class="ver-btn-label">Ver</span>
      <span class="ver-btn-arrow">→</span>
    </button>

    <div class="flourish"><span>01001100 01001111 01010110 01000101</span></div>
  </main>

  <div id="transition-veil" class="transition-veil" aria-hidden="true"></div>

  <script src="js/enhance.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
